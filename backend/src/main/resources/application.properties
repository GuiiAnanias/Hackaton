# ===============================
# CONFIGURAÇŐES GERAIS DO SERVIDOR
# ===============================
spring.application.name=backend
server.port=8080

# ===============================
# CONEXĂO COM O MYSQL (XAMPP)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/bolao_copa_2026?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# CONFIGURAÇŐES DO JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# CONFIGURAÇŐES DO THYMELEAF (FRONTEND ADMIN)
# ===============================
spring.thymeleaf.cache=false