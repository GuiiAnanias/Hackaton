<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/admin-head :: head(${partida == null ? 'Nova Partida' : 'Editar Partida'})}"></head>

<body>
    <div class="admin-wrapper">
        <aside th:replace="~{fragments/admin-sidebar :: sidebar('partidas')}"></aside>

        <main class="admin-content">
            <section class="admin-header">
                <h2 th:text="${partida == null ? 'Nova Partida' : 'Editar Partida'}">Nova Partida</h2>
                <p>Cadastre ou atualize uma partida da Copa do Mundo 2026.</p>
            </section>

            <section class="alert-error" th:if="${mensagemErro != null}">
                <strong th:text="${mensagemErro}">Erro ao cadastrar partida.</strong>
            </section>

            <div class="empty-state" th:if="${selecoes.size() < 2}">
                <strong>Cadastre pelo menos duas seleções.</strong>
                <span>É necessário ter duas seleções cadastradas para criar uma partida.</span>
                <a class="admin-button-link" th:href="@{/admin/selecoes/nova}">Cadastrar seleção</a>
            </div>

            <form class="admin-form" method="post"
                th:action="${partida == null ? '/admin/partidas' : '/admin/partidas/' + partida.id + '/editar'}"
                th:if="${selecoes.size() >= 2}">

                <div class="form-group">
                    <label for="selecaoMandanteId">Seleção mandante</label>
                    <select id="selecaoMandanteId" name="selecaoMandanteId" required>
                        <option value="">Selecione</option>
                        <option th:each="selecao : ${selecoes}" th:value="${selecao.id}" th:text="${selecao.nome}"
                            th:selected="${partida != null && partida.selecaoMandanteId == selecao.id}">
                            Brasil
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="selecaoVisitanteId">Seleção visitante</label>
                    <select id="selecaoVisitanteId" name="selecaoVisitanteId" required>
                        <option value="">Selecione</option>
                        <option th:each="selecao : ${selecoes}" th:value="${selecao.id}" th:text="${selecao.nome}"
                            th:selected="${partida != null && partida.selecaoVisitanteId == selecao.id}">
                            Argentina
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="dataHora">Data e hora</label>
                    <input type="datetime-local" id="dataHora" name="dataHora"
                        th:value="${partida == null || partida.dataHora == null ? '' : #temporals.format(partida.dataHora, 'yyyy-MM-dd''T''HH:mm')}"
                        required>
                </div>

                <div class="form-group">
                    <label for="fase">Fase</label>
                    <select id="fase" name="fase" required>
                        <option value="">Selecione</option>
                        <option th:each="faseOpcao : ${fases}" th:value="${faseOpcao.name()}"
                            th:text="${faseOpcao.descricao}"
                            th:selected="${partida != null && partida.fase == faseOpcao.descricao}">
                            Fase de grupos
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="grupo">Grupo</label>
                    <input type="text" id="grupo" name="grupo" placeholder="G" maxlength="2"
                        th:value="${partida == null ? '' : partida.grupo}" required>
                </div>

                <div class="form-group">
                    <label for="estadio">Estádio</label>
                    <select id="estadio" name="estadio" required>
                        <option value="">Selecione</option>
                        <option th:each="estadioOpcao : ${estadios}" th:value="${estadioOpcao.name()}"
                            th:text="${estadioOpcao.descricao}"
                            th:selected="${partida != null && partida.estadio == estadioOpcao.descricao}">
                            Atlanta Stadium
                        </option>
                    </select>
                </div>

                <div class="form-actions">
                    <a class="admin-button-secondary" th:href="@{/admin/partidas}">Cancelar</a>
                    <button type="submit" class="admin-button"
                        th:text="${partida == null ? 'Cadastrar partida' : 'Salvar alterações'}">Cadastrar
                        partida</button>
                </div>
            </form>
        </main>
    </div>

    <script th:replace="~{fragments/admin-head :: scripts}"></script>
</body>

</html>
